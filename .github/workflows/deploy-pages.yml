name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Replace __BACKEND_API_URL__ placeholder with the actual Render.com URL.
      # Set BACKEND_API_URL in: GitHub repo → Settings → Variables → Actions
      # Example value: https://resono.onrender.com
      - name: Inject backend API URL
        run: |
          sed -i "s|__BACKEND_API_URL__|${{ vars.BACKEND_API_URL }}|g" \
            src/environments/environment.prod.ts
        working-directory: frontend

      - name: Build Angular app (production)
        run: npx ng build --configuration production --base-href /Sound_Competition/
        working-directory: frontend

      # GitHub Pages returns 404 for any URL that is not a real file.
      # Copying index.html → 404.html lets Angular's router boot on deep links.
      - name: Create 404.html for SPA routing
        run: cp dist/resono/browser/index.html dist/resono/browser/404.html
        working-directory: frontend

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/resono/browser

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
